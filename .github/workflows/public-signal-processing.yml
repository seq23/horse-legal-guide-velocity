name: Public Signal Processing

on:
  workflow_dispatch:
  schedule:
    - cron: "30 13 * * 1-5"

permissions:
  contents: write

jobs:
  process-public-signals:
    runs-on: ubuntu-latest
    env:
      SIGNAL_SOURCE_TIMEOUT_MS: "7000"
      SIGNAL_FETCH_TIMEOUT_MS: "7000"
      SIGNAL_COLLECT_SEQUENTIAL: "true"
      REDDIT_PUBLIC_PREFER_RSS: "true"
      REDDIT_PUBLIC_LIMIT: "5"
      REDDIT_PUBLIC_MAX_SIGNALS: "20"
      REDDIT_PUBLIC_TERM_LIMIT: "3"
      REDDIT_PUBLIC_DELAY_MS: "900"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: npm ci

      - name: Collect public signals
        run: npm run collect:signals

      - name: Normalize signals
        run: node scripts/community/normalize_signals.js

      - name: Map signals to targets
        run: node scripts/community/map_signals_to_targets.js

      - name: Generate ingestion report
        run: node scripts/community/generate_ingestion_report.js

      - name: Build
        run: npm run build

      - name: Validate
        run: npm run validate:all

      - name: Commit generated updates
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "Run public signal processing"
            git push
          else
            echo "No public signal updates to commit."
          fi
