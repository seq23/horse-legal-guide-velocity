name: Build Repo

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SITE_DOMAIN: https://horselegalguide.com
      CANONICAL_DOMAIN: https://wisecovington.com
      INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
      INDEXNOW_KEY_LOCATION: https://horselegalguide.com/indexnow.txt
      GSC_SITE_URL: sc-domain:horselegalguide.com
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: horse-legal-guide-dist
          path: |
            dist
            .build
            _ops/reports
