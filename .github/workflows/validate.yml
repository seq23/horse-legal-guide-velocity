name: Validate Repo

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      SITE_DOMAIN: https://horselegalguide.com
      CANONICAL_DOMAIN: https://wisecovington.com
      INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
      INDEXNOW_KEY_LOCATION: https://horselegalguide.com/indexnow.txt
      GSC_SITE_URL: sc-domain:horselegalguide.com
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        run: npm ci
      - name: Preflight
        run: npm run validate:preflight
      - name: Build
        run: npm run build
      - name: Validate
        run: npm run validate:all
